<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - THE OUTRAGE</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="top-bar">
    ADMIN DASHBOARD
  </div>

  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">THE <span>OUTRAGE</span></a>
      <div class="header-icons">
        <button onclick="window.location.href='/'">🏠 Home</button>
        <button onclick="handleLogout()">🚪 Logout</button>
      </div>
    </div>
  </header>

  <div class="admin-dashboard">
    <div class="admin-header">
      <h1>ADMIN DASHBOARD</h1>
      <div class="admin-nav">
        <button class="active" onclick="showSection('products')">Products</button>
        <button onclick="showSection('orders')">Orders</button>
      </div>
    </div>

    <!-- Products Section -->
    <div id="productsSection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>Manage Products</h2>
        <button class="btn btn-primary" onclick="showAddProductForm()">+ Add Product</button>
      </div>

      <div id="addProductForm" style="display: none; background: var(--secondary); padding: 30px; border-radius: 10px; margin-bottom: 30px;">
        <h3 style="margin-bottom: 20px;">Add New Product</h3>
        <form onsubmit="addProduct(event)">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" required>
          </div>
          <div class="form-group">
            <label>Brand</label>
            <select id="productBrand" required>
              <option value="">Select Brand</option>
              <option value="1">Nike</option>
              <option value="2">Adidas</option>
              <option value="3">Puma</option>
              <option value="4">Levis</option>
              <option value="5">Outfitters</option>
              <option value="6">Breakout</option>
              <option value="7">Engine</option>
              <option value="8">Zara</option>
              <option value="9">Mango</option>
              <option value="10">H&M</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="productCategory" required>
              <option value="">Select Category</option>
              <option value="1">Men - T-Shirts</option>
              <option value="2">Men - Polo T-Shirts</option>
              <option value="3">Men - Shirts</option>
              <option value="4">Men - Shorts</option>
              <option value="5">Men - Trousers</option>
              <option value="6">Women - T-Shirts</option>
              <option value="7">Women - Shorts</option>
              <option value="8">Women - Trousers</option>
              <option value="9">Junior - T-Shirts</option>
              <option value="10">Junior - Polo T-Shirts</option>
              <option value="11">Junior - Shorts</option>
              <option value="12">Junior - Trousers</option>
            </select>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="productGender" required>
              <option value="men">Men</option>
              <option value="women">Women</option>
              <option value="junior">Junior</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="productDescription" required rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Original Price (PKR)</label>
            <input type="number" id="originalPrice" required>
          </div>
          <div class="form-group">
            <label>Sale Price (PKR)</label>
            <input type="number" id="salePrice" required>
          </div>
          <div class="form-group">
            <label>Discount (%)</label>
            <input type="number" id="discount" required>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="productImage" required placeholder="/images/products/product.jpg">
          </div>
          <div class="form-group">
            <label>Sizes (comma separated)</label>
            <input type="text" id="productSizes" required placeholder="S,M,L,XL">
          </div>
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="productStock" required>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="productFeatured"> Featured Product
            </label>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="productNewArrival"> New Arrival
            </label>
          </div>
          <button type="submit" class="btn btn-primary">Add Product</button>
          <button type="button" class="btn btn-secondary" onclick="hideAddProductForm()">Cancel</button>
        </form>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>

    <!-- Orders Section -->
    <div id="ordersSection" style="display: none;">
      <h2 style="margin-bottom: 30px;">Manage Orders</h2>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>City</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadProducts();
      loadOrders();
    });

    function showSection(section) {
      document.getElementById('productsSection').style.display = section === 'products' ? 'block' : 'none';
      document.getElementById('ordersSection').style.display = section === 'orders' ? 'block' : 'none';
      
      document.querySelectorAll('.admin-nav button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function showAddProductForm() {
      document.getElementById('addProductForm').style.display = 'block';
    }

    function hideAddProductForm() {
      document.getElementById('addProductForm').style.display = 'none';
    }

    async function loadProducts() {
      try {
        const response = await fetch('/api/admin/products');
        const products = await response.json();
        
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = products.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.brand_name}</td>
            <td>PKR ${p.sale_price}</td>
            <td>${p.stock}</td>
            <td class="admin-actions">
              <button class="edit-btn" onclick="editProduct(${p.id})">Edit</button>
              <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading products:', error);
      }
    }

    async function addProduct(event) {
      event.preventDefault();
      
      const sizes = document.getElementById('productSizes').value.split(',').map(s => s.trim());
      
      const productData = {
        name: document.getElementById('productName').value,
        brand_id: parseInt(document.getElementById('productBrand').value),
        category_id: parseInt(document.getElementById('productCategory').value),
        gender: document.getElementById('productGender').value,
        description: document.getElementById('productDescription').value,
        original_price: parseFloat(document.getElementById('originalPrice').value),
        sale_price: parseFloat(document.getElementById('salePrice').value),
        discount: parseInt(document.getElementById('discount').value),
        image: document.getElementById('productImage').value,
        sizes: sizes,
        stock: parseInt(document.getElementById('productStock').value),
        featured: document.getElementById('productFeatured').checked ? 1 : 0,
        new_arrival: document.getElementById('productNewArrival').checked ? 1 : 0
      };

      try {
        const response = await fetch('/api/admin/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(productData)
        });

        const result = await response.json();
        if (result.success) {
          alert('Product added successfully!');
          hideAddProductForm();
          loadProducts();
          document.getElementById('loginForm').reset();
        } else {
          alert('Error adding product');
        }
      } catch (error) {
        console.error('Error adding product:', error);
        alert('Error adding product');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product?')) return;

      try {
        const response = await fetch(`/api/admin/products/${id}`, {
          method: 'DELETE'
        });

        const result = await response.json();
        if (result.success) {
          alert('Product deleted successfully!');
          loadProducts();
        } else {
          alert('Error deleting product');
        }
      } catch (error) {
        console.error('Error deleting product:', error);
        alert('Error deleting product');
      }
    }

    function editProduct(id) {
      alert('Edit functionality - Implement as needed');
    }

    async function loadOrders() {
      try {
        const response = await fetch('/api/admin/orders');
        const orders = await response.json();
        
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = orders.map(o => `
          <tr>
            <td>${o.id}</td>
            <td>${o.customer_name}</td>
            <td>${o.phone}</td>
            <td>${o.city}</td>
            <td>PKR ${o.total}</td>
            <td>
              <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding: 5px; background: var(--primary); color: white; border: 1px solid var(--glass-border);">
                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </td>
            <td>${new Date(o.created_at).toLocaleDateString()}</td>
            <td>
              <button onclick="viewOrderDetails(${o.id})">View Details</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    }

    async function updateOrderStatus(id, status) {
      try {
        const response = await fetch(`/api/admin/orders/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        const result = await response.json();
        if (result.success) {
          alert('Order status updated!');
        } else {
          alert('Error updating order status');
        }
      } catch (error) {
        console.error('Error updating order status:', error);
        alert('Error updating order status');
      }
    }

    function viewOrderDetails(id) {
      alert('View order details - Implement as needed');
    }

    async function handleLogout() {
      try {
        await fetch('/api/admin/logout', { method: 'POST' });
        window.location.href = '/admin/login';
      } catch (error) {
        console.error('Logout error:', error);
      }
    }
  </script>
</body>
</html>
